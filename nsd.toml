[global]
socket_path = "/tmp/nsd.sock"
log_level = "info"
# If the daemon should launch specific programs on startup
autostart = ["ld-icons", "h-corners"]

[modules]
# Which internal daemon features are active?
automount = true
notifications = true
labwc_bridge = true
hot_corner_relay = true
clipboard = true
menu_watcher = true

[automount]
# Rules for mounting media
mount_path = "/media"
auto_open_fm = false  # Open a file manager after mounting?
blacklist = ["/dev/sda1"] # Partitions that should be ignored

[notifications]
# Notification server settings
timeout = 5000  # Milliseconds until a popup disappears
max_visible = 3
position = "top-right"

[hot_corner_relay]
# Broadcast command execution results to IPC clients.
result_broadcast = true

[clipboard]
# Max number of clipboard history entries kept in RAM.
max_items = 50
# Polling interval in seconds for clipboard checks.
poll_interval = 0.5

[menu_watcher]
enabled = true
extra_paths = ["/opt/my_apps/share/applications"]
debounce_seconds = 1.0
include_app_list = false