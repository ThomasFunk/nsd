[global]
socket_path = "/tmp/nsd.sock"
log_level = "info"
# Falls der Daemon bestimmte Programme beim Starten mitziehen soll
autostart = ["ld-icons", "h-corners"]

[modules]
# Welche internen Funktionen des Daemons sind aktiv?
automount = true
notifications = true
labwc_bridge = true
hot_corner_relay = true
clipboard = true
menu_watcher = true

[automount]
# Regeln für das Einbinden von Medien
mount_path = "/media"
auto_open_fm = false  # Soll nach dem Mounten ein Dateimanager öffnen?
blacklist = ["/dev/sda1"] # Partitionen, die ignoriert werden sollen

[notifications]
# Einstellungen für den Notification-Server
timeout = 5000  # Millisekunden, bis ein Popup verschwindet
max_visible = 3
position = "top-right"

[hot_corner_relay]
# Broadcast command execution results to IPC clients.
result_broadcast = true

[clipboard]
# Max number of clipboard history entries kept in RAM.
max_items = 50
# Polling interval in seconds for clipboard checks.
poll_interval = 0.5

[menu_watcher]
enabled = true
extra_paths = ["/opt/my_apps/share/applications"]
debounce_seconds = 1.0
include_app_list = false